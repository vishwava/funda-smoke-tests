name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Format, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npm run install:browsers

      - name: Build project
        run: npm run build

      - name: Lint & format
        run: npm run format:check

      - name: Run tests
        id: run-tests
        run: npm test
        env:
          CI: true

      - name: Upload results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
